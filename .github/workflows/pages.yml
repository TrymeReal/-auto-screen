name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'dashboard.html'
      - 'positions.json'
      - 'seen.json'
      - 'tracking_log.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site folder
        run: |
          mkdir -p site
          cp dashboard.html site/index.html
          # Ikut copy file data JSON yang di-fetch oleh dashboard.html,
          # supaya path relatif (positions.json, dst) tetap kebaca di sub-path Pages.
          [ -f positions.json ]     && cp positions.json     site/ || true
          [ -f seen.json ]          && cp seen.json          site/ || true
          [ -f tracking_log.json ]  && cp tracking_log.json  site/ || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
